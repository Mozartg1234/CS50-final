<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sheet Music to MusicXML</title>
    <style>
        body {
            background-color: #C0C0C0;
            min-height: 100vh;
        }
 
        #logo {
            position: fixed;
            top: 12px;
            left: 12px;
            width: 200px;
            height: auto;
            z-index: 1000;
        }
 
        #preview-box {
            width: 60%;
            max-width: 900px;
            min-height: 400px;
            max-height: 75vh;
            margin: 1.5rem auto 0;
            border: 2px dashed #aaa;
            border-radius: 8px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
 
        #preview-box img {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            display: block;
        }
 
        #preview-placeholder {
            color: #999;
            font-size: 1rem;
            text-align: center;
            padding: 2rem;
        }
 
        .toolbar {
            padding-top: 4vh;
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }
 
        #error-container {
            width: 60%;
            max-width: 900px;
            margin: 1rem auto 0;
        }
 
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            gap: 1rem;
        }
 
        #loading-overlay.active {
            display: flex;
        }
    </style>
</head>
<body>
 
    <img id="logo" src="/static/ActiveForces.png" alt="ActiveForces logo">
 
    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div class="spinner-border text-light" style="width:3rem;height:3rem;" role="status"></div>
        <div>Converting your sheet music to MusicXML…<br><small>This usually takes 3–5 minutes. Please wait.</small></div>
    </div>
 
    <main>
        <!-- Toolbar -->
        <div class="toolbar">
            <form id="upload-form" action="/convert" method="post" enctype="multipart/form-data" class="d-flex gap-3 align-items-center">
                <input type="file" id="file-input" name="image" accept="image/*" style="display:none" required>
                <button class="btn btn-primary" id="upload-btn" type="button">Upload Image</button>
                <button class="btn btn-success" id="convert-btn" type="submit">Convert to MusicXML</button>
            </form>
        </div>

        <!-- Container to dynamically display backend errors -->
        <div id="error-container"></div>
 
        <!-- Image preview -->
        <div id="preview-box">
            <div id="preview-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#ccc" viewBox="0 0 16 16" style="display:block;margin:0 auto 0.75rem;">
                    <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                    <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
                </svg>
                Upload an image to preview it here
            </div>
        </div>
    </main>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const previewBox = document.getElementById('preview-box');
        const placeholder = document.getElementById('preview-placeholder');
        const convertBtn = document.getElementById('convert-btn');
        const form = document.getElementById('upload-form');
        const loadingOverlay = document.getElementById('loading-overlay');
        const errorContainer = document.getElementById('error-container');
 
        // Clicking "Upload Image" opens the file picker
        uploadBtn.addEventListener('click', () => fileInput.click());
 
        // Show image preview when a file is selected
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
 
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file (PNG, JPG, JPEG, or GIF).');
                fileInput.value = '';
                return;
            }
 
            const reader = new FileReader();
            reader.onload = () => {
                // Remove placeholder, show image
                previewBox.innerHTML = '';
                const img = document.createElement('img');
                img.src = reader.result;
                img.alt = file.name;
                previewBox.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
 
        // Handle conversion submission using AJAX fetch to manage long wait time and download execution
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop native page reload redirect
            
            if (!fileInput.files || !fileInput.files[0]) {
                alert('Please upload an image first.');
                return;
            }

            // Reset UI state
            convertBtn.disabled = true;
            loadingOverlay.classList.add('active');
            errorContainer.innerHTML = ''; 

            const formData = new FormData(form);

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const serverErrorText = await response.text();
                    throw new Error(serverErrorText || 'An error occurred during server side conversion.');
                }

                // Process the file blob returned by Flask send_file
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                
                // Read custom filename header if available, otherwise fallback
                const disposition = response.headers.get('Content-Disposition');
                let filename = 'converted_score.musicxml';
                if (disposition && disposition.includes('filename=')) {
                    filename = disposition.split('filename=')[1].replaceAll('"', '');
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click(); // Programmatically trigger file download
                
                // Clean up references
                window.URL.revokeObjectURL(url);
                a.remove();

            } catch (error) {
                console.error(error);
                // Create custom bootstrap error block
                errorContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Conversion Failed:</strong> ${error.message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            } finally {
                // Return interface to standard active states
                convertBtn.disabled = false;
                loadingOverlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
